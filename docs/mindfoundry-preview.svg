<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#152a3f"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- top NVIDIA-green accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="#76b900"/>

  <!-- top-right small label -->
  <text x="1240" y="50" fill="#76b900" font-size="14" font-weight="700" text-anchor="end" letter-spacing="2">NVIDIA AGENT HACKATHON 2026</text>

  <!-- product name -->
  <text x="80" y="180" fill="#ffffff" font-size="92" font-weight="900">MindFoundry</text>

  <!-- tagline -->
  <text x="80" y="240" fill="#9ab4d0" font-size="26" font-weight="500">
    NemoClaw-secured long agent for teammate knowledge.
  </text>
  <text x="80" y="278" fill="#9ab4d0" font-size="26" font-weight="500">
    Cited Nemotron answers. Policy-enforced privacy.
  </text>

  <!-- horizontal divider -->
  <line x1="80" y1="330" x2="1200" y2="330" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- four stack pills -->
  <g font-size="20" font-weight="700">
    <rect x="80"  y="360" width="220" height="56" rx="28" ry="28" fill="#76b900"/>
    <text x="190" y="397" fill="#0d1b2a" text-anchor="middle">Nemotron</text>

    <rect x="320" y="360" width="220" height="56" rx="28" ry="28" fill="none" stroke="#76b900" stroke-width="2.5"/>
    <text x="430" y="397" fill="#ffffff" text-anchor="middle">NemoClaw</text>

    <rect x="560" y="360" width="220" height="56" rx="28" ry="28" fill="none" stroke="#76b900" stroke-width="2.5"/>
    <text x="670" y="397" fill="#ffffff" text-anchor="middle">NVIDIA NIM</text>

    <rect x="800" y="360" width="220" height="56" rx="28" ry="28" fill="none" stroke="#76b900" stroke-width="2.5"/>
    <text x="910" y="397" fill="#ffffff" text-anchor="middle">OpenClaw</text>
  </g>

  <!-- stat row -->
  <g>
    <text x="80"  y="490" fill="#76b900" font-size="48" font-weight="900">100%</text>
    <text x="80"  y="520" fill="#9ab4d0" font-size="14" letter-spacing="1">ROUTING</text>

    <text x="260" y="490" fill="#76b900" font-size="48" font-weight="900">100%</text>
    <text x="260" y="520" fill="#9ab4d0" font-size="14" letter-spacing="1">POLICY</text>

    <text x="440" y="490" fill="#76b900" font-size="48" font-weight="900">100%</text>
    <text x="440" y="520" fill="#9ab4d0" font-size="14" letter-spacing="1">PRIVACY</text>

    <text x="620" y="490" fill="#76b900" font-size="48" font-weight="900">100%</text>
    <text x="620" y="520" fill="#9ab4d0" font-size="14" letter-spacing="1">NO-HALLUCINATION</text>

    <text x="900" y="490" fill="#ffffff" font-size="48" font-weight="900">500</text>
    <text x="900" y="520" fill="#9ab4d0" font-size="14" letter-spacing="1">INCIDENTS EVALUATED</text>
  </g>

  <!-- bottom strip -->
  <text x="80"  y="600" fill="#6c829c" font-size="14">github.com/CloseForge-org/mindfoundry</text>
  <text x="1200" y="600" fill="#6c829c" font-size="14" text-anchor="end">NeMo Lodge demo · 8 staff replicants · bilingual</text>
</svg>
